steps:
  # Build Go app
  - name: 'gcr.io/cloud-builders/go'
    env: ['GOPATH=/gopath']
    args: ['build', '-o', 'main', 'main.go']

  # Build Docker image (IMPORTANT: correct name)
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'us-east1-docker.pkg.dev/$PROJECT_ID/my-repository/hello-cloudbuild:v2.0'
      - '.'

  # Push image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'us-east1-docker.pkg.dev/$PROJECT_ID/my-repository/hello-cloudbuild:v2.0'

  # Get GKE credentials
  - name: 'gcr.io/cloud-builders/gcloud'
    args:
      - 'container'
      - 'clusters'
      - 'get-credentials'
      - 'hello-cluster'
      - '--zone'
      - 'us-east1-d'
      - '--project'
      - '$PROJECT_ID'

  # Deploy to dev namespace
  - name: 'gcr.io/cloud-builders/kubectl'
    args:
      - 'apply'
      - '-f'
      - 'dev/deployment.yaml'
      - '-n'
      - 'dev'

options:
  logging: CLOUD_LOGGING_ONLY
